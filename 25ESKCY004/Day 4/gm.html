<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            position: relative;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }

        .counter {
            position: relative;
            z-index: 1;
            margin: 10px 15px;
        }

        img {
            width: 100px;
            position: absolute;
            cursor: pointer;
            transition: left 0.2s ease, top 0.2s ease;
        }
    </style>
</head>
<body>
    <p class="counter">Apple: <span id="apple">0</span></p>
    <p class="counter">Banana: <span id="banana">0</span></p>
    <img src="https://healthjade.net/wp-content/uploads/2017/10/apple-fruit.jpg" onclick="clickImage('apple', this)">
    <img src="https://th.bing.com/th/id/OIP.OeOKEyU8sHeSThcUsPKS6QHaF2?w=217&h=180&c=7&r=0&o=7&dpr=1.3&pid=1.7&rm=3" onclick="clickImage('banana', this)">
    <script>
        let appleCount = 0;
        let bananaCount = 0;

        function moveImage(img) {
            const maxLeft = window.innerWidth - img.offsetWidth;
            const maxTop = window.innerHeight - img.offsetHeight;
            img.style.left = Math.random() * maxLeft + "px";
            img.style.top = Math.random() * maxTop + "px";
        }

        function clickImage(type, img) {
            if (type === "apple") {
                appleCount++;
                document.getElementById("apple").textContent = appleCount;
            } else {
                bananaCount++;
                document.getElementById("banana").textContent = bananaCount;
            }
            moveImage(img);
        }

        document.querySelectorAll("img").forEach(moveImage);
    </script>
</body>
</html>
