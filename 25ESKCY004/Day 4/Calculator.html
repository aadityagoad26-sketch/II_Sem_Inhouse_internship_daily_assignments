<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form>
        <input type="text" id="number1" placeholder="Enter 1st num">
        <input type="text" id="number2" placeholder="Enter 2nd num">
        <select id="operator">
            <option value="+">+</option>
            <option value="-">-</option>
            <option value="*">*</option>
            <option value="/">/</option>
        </select>
        <button type="button" onclick="perfArithCalc()">
            Calculate
        </button>
        <div id="result">
        </div>
    </form>
    <script>
        function perfArithCalc(){
            let var1=10;
            const pi=3.14;
            
            const number1=parseFloat(document.getElementById("number1").value);
            const number2=parseFloat(document.getElementById("number2").value);

            const operator=document.getElementById("operator").value;
            let result=0;
            switch(operator){
                case "+":
                    result=number1 + number2;
                    break;
                case "-":
                    result=number1-number2;
                    break;
                case "*":
                    result=number1*number2;
                    break;
                case "/":
                    if(number2==0){
                        result="div by 0";
                    }else{
                        result=number1/number2;
                    }
                    break;
            }
            const resDiv=document.getElementById("result");
            resDiv.innerHTML=result;
        }
        
    </script>
</body>
</html>
